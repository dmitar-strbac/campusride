repos:
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        entry: bash -c "cd frontend && npm run lint"
        language: system
        pass_filenames: false

      - id: frontend-format
        name: frontend format check
        entry: bash -c "cd frontend && npx prettier --check ."
        language: system
        pass_filenames: false

      - id: backend-tests
        name: backend tests
        entry: bash -c "cd backend && ./mvnw test"
        language: system
        pass_filenames: false
